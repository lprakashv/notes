name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/main.yml
      - book.toml
      - notes-book/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        env:
          MDBOOK_VERSION: 0.5.4
        run: |
          mkdir --parents "$RUNNER_TEMP/mdbook"
          curl --fail --location --silent --show-error \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar --extract --gzip --directory "$RUNNER_TEMP/mdbook"
          echo "$RUNNER_TEMP/mdbook" >> "$GITHUB_PATH"

      - name: Build the book
        run: mdbook build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
